{% extends "base.html" %}
{% block title %}Log in — TaskMaster{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Log in to your TaskMaster account.</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary btn-full">Log in</button>
    </form>

    <p class="auth-switch">No account yet? <a href="{{ url_for('register') }}">Sign up free</a></p>
  </div>
</div>

{% endblock %}

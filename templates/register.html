{% extends "base.html" %}
{% block title %}Sign up — TaskMaster{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">Create an account</h2>
    <p class="auth-sub">Start organising your tasks in seconds.</p>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your_name" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" minlength="8" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>

{% endblock %}
